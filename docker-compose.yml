services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: braquiapp
      POSTGRES_USER: braqui
      POSTGRES_PASSWORD: braqui
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://braqui:braqui@db/braquiapp
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
